<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每週內容引擎 | 睦聚開發 數據儀表板</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-page: #0F172A;
      --bg-card: #1E293B;
      --bg-header: #0B1120;
      --blue-bright: #60A5FA;
      --gold-accent: #FBBF24;
      --text-body: #CBD5E1;
      --text-muted: #64748B;
      --green-up: #4ADE80;
      --red-down: #F87171;
      --border-grid: #334155;
      --highlight-row: rgba(96,165,250,0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--bg-page);
      color: var(--text-body);
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ─── Header ─── */
    .header {
      background: var(--bg-header);
      border: 1px solid var(--border-grid);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .header-title {
      flex: 1;
    }

    .header-title h1 {
      font-size: 28px;
      font-weight: 700;
      color: #F1F5F9;
      margin-bottom: 4px;
      font-family: 'Noto Sans TC', sans-serif;
    }

    .header-title p {
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .header-info {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 13px;
    }

    .header-info-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .header-info-label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .header-info-value {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      color: var(--blue-bright);
      font-size: 14px;
      font-weight: 600;
    }

    .light-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .light-indicator.green {
      background-color: var(--green-up);
      box-shadow: 0 0 8px var(--green-up);
    }

    .light-indicator.yellow {
      background-color: var(--gold-accent);
      box-shadow: 0 0 8px var(--gold-accent);
    }

    .light-indicator.red {
      background-color: var(--red-down);
      box-shadow: 0 0 8px var(--red-down);
    }

    /* ─── KPI Cards ─── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .kpi-card {
      background: var(--bg-card);
      border: 1px solid var(--border-grid);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }

    .kpi-number {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 32px;
      font-weight: 700;
      color: var(--blue-bright);
      margin-bottom: 8px;
    }

    .kpi-label {
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ─── Workflow Section ─── */
    .section-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #F1F5F9;
      margin-bottom: 16px;
      margin-top: 24px;
    }

    .workflow-container {
      background: var(--bg-card);
      border: 1px solid var(--border-grid);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .workflow-steps {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .workflow-step {
      flex: 1;
      min-width: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .workflow-step-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      transition: all 0.3s ease;
    }

    .workflow-step-circle.pending {
      background-color: var(--border-grid);
      color: var(--text-muted);
      border: 2px solid var(--border-grid);
    }

    .workflow-step-circle.active {
      background-color: var(--blue-bright);
      color: var(--bg-page);
      border: 2px solid var(--blue-bright);
      box-shadow: 0 0 16px var(--blue-bright);
    }

    .workflow-step-circle.completed {
      background-color: var(--green-up);
      color: var(--bg-page);
      border: 2px solid var(--green-up);
    }

    .workflow-step-label {
      font-size: 11px;
      text-align: center;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .workflow-arrow {
      flex-shrink: 0;
      width: 20px;
      height: 2px;
      background-color: var(--border-grid);
      margin-bottom: 38px;
    }

    /* ─── Role Status ─── */
    .role-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .role-card {
      background: var(--bg-card);
      border: 1px solid var(--border-grid);
      border-radius: 8px;
      padding: 16px;
    }

    .role-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .role-name {
      font-weight: 700;
      color: #F1F5F9;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 1px;
      flex: 1;
    }

    .role-badge {
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .role-badge.active {
      background-color: rgba(74, 222, 128, 0.2);
      color: var(--green-up);
    }

    .role-badge.idle {
      background-color: rgba(100, 116, 139, 0.2);
      color: var(--text-muted);
    }

    .role-badge.blocked {
      background-color: rgba(248, 113, 113, 0.2);
      color: var(--red-down);
    }

    .role-detail {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .role-detail label {
      display: block;
      margin-bottom: 4px;
      color: var(--text-muted);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .role-detail-value {
      color: var(--text-body);
      margin-bottom: 8px;
      word-break: break-word;
    }

    /* ─── Candidates Table ─── */
    .table-container {
      background: var(--bg-card);
      border: 1px solid var(--border-grid);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .table-filters {
      padding: 16px;
      border-bottom: 1px solid var(--border-grid);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 12px;
      border: 1px solid var(--border-grid);
      background: transparent;
      color: var(--text-body);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
    }

    .filter-btn:hover {
      border-color: var(--blue-bright);
      color: var(--blue-bright);
    }

    .filter-btn.active {
      background-color: var(--blue-bright);
      border-color: var(--blue-bright);
      color: var(--bg-page);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      background-color: var(--bg-header);
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: #F1F5F9;
      border-bottom: 1px solid var(--border-grid);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-grid);
      color: var(--text-body);
    }

    tr:hover {
      background-color: var(--highlight-row);
    }

    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-badge.draft {
      background-color: rgba(100, 116, 139, 0.2);
      color: var(--text-muted);
    }

    .status-badge.review {
      background-color: rgba(251, 191, 36, 0.2);
      color: var(--gold-accent);
    }

    .status-badge.published {
      background-color: rgba(74, 222, 128, 0.2);
      color: var(--green-up);
    }

    .theme-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      background-color: rgba(96, 165, 250, 0.15);
      color: var(--blue-bright);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state p {
      font-size: 13px;
      margin-bottom: 8px;
    }

    /* ─── Rules Section ─── */
    .rules-container {
      background: var(--bg-card);
      border: 1px solid var(--border-grid);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .rule-item {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-grid);
    }

    .rule-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .rule-title {
      font-weight: 600;
      color: var(--blue-bright);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .rule-content {
      font-size: 13px;
      color: var(--text-body);
      line-height: 1.6;
    }

    /* ─── Control Log ─── */
    .timeline {
      background: var(--bg-card);
      border: 1px solid var(--border-grid);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .timeline-item {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-grid);
    }

    .timeline-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .timeline-marker {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: var(--border-grid);
      border: 2px solid var(--blue-bright);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue-bright);
      font-size: 10px;
      font-weight: 700;
    }

    .timeline-content {
      flex: 1;
    }

    .timeline-date {
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .timeline-type {
      display: inline-block;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      background-color: rgba(96, 165, 250, 0.15);
      color: var(--blue-bright);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .timeline-summary {
      font-size: 13px;
      color: var(--text-body);
      line-height: 1.6;
    }

    /* ─── Loading & Error ─── */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .error-message {
      background-color: rgba(248, 113, 113, 0.1);
      border: 1px solid var(--red-down);
      color: var(--red-down);
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 13px;
    }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }

      .header {
        padding: 16px;
      }

      .header-top {
        flex-direction: column;
        gap: 12px;
      }

      .header-info {
        gap: 16px;
      }

      .kpi-row {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }

      .workflow-steps {
        gap: 8px;
      }

      .workflow-step {
        min-width: 90px;
      }

      .workflow-step-circle {
        width: 40px;
        height: 40px;
        font-size: 12px;
      }

      .workflow-arrow {
        display: none;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 8px 12px;
      }

      .role-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-top">
        <div class="header-title">
          <h1>每週內容引擎</h1>
          <p>睦聚開發 × 數據儀表板</p>
        </div>
        <div style="text-align: right;">
          <div style="margin-bottom: 8px;">
            <span class="light-indicator" id="lightIndicator"></span>
            <span id="lightStatus" style="font-size: 13px;">--</span>
          </div>
        </div>
      </div>

      <div class="header-info">
        <div class="header-info-item">
          <span class="header-info-label">Project Code</span>
          <span class="header-info-value" id="projectCode">--</span>
        </div>
        <div class="header-info-item">
          <span class="header-info-label">Start Date</span>
          <span class="header-info-value" id="startDate">--</span>
        </div>
        <div class="header-info-item">
          <span class="header-info-label">End Date</span>
          <span class="header-info-value" id="endDate">--</span>
        </div>
        <div class="header-info-item">
          <span class="header-info-label">Total Weeks</span>
          <span class="header-info-value" id="totalWeeks">--</span>
        </div>
        <div class="header-info-item">
          <span class="header-info-label">Current Week</span>
          <span class="header-info-value" id="currentWeek">--</span>
        </div>
        <div class="header-info-item">
          <span class="header-info-label">Phase</span>
          <span class="header-info-value" id="phase">--</span>
        </div>
      </div>
    </div>

    <!-- KPI Cards -->
    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-number"><span id="totalArticlesNum">0</span>/<span id="targetArticlesNum">0</span></div>
        <div class="kpi-label">已發布文章</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-number" id="consecutiveWeeksNum">0</div>
        <div class="kpi-label">連續產出週數</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-number" id="inquiriesNum">0</div>
        <div class="kpi-label">諮詢/互動</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-number" id="partnerInteractionsNum">0</div>
        <div class="kpi-label">同業互動</div>
      </div>
    </div>

    <!-- Workflow Visualization -->
    <div class="section-title">6步驟生產流程</div>
    <div class="workflow-container">
      <div class="workflow-steps" id="workflowSteps"></div>
    </div>

    <!-- Role Status -->
    <div class="section-title">角色狀態</div>
    <div class="role-grid" id="roleGrid"></div>

    <!-- Candidates Section -->
    <div class="section-title">候選題庫</div>
    <div class="table-container">
      <div class="table-filters" id="themeFilters"></div>
      <div id="candidatesTable"></div>
    </div>

    <!-- Articles Section -->
    <div class="section-title">文章列表</div>
    <div class="table-container">
      <div id="articlesTable"></div>
    </div>

    <!-- Rules Section -->
    <div class="section-title">守則提醒</div>
    <div class="rules-container">
      <div class="rule-item">
        <div class="rule-title">Costco 模式</div>
        <div class="rule-content">少而準，長期建立信任</div>
      </div>
      <div class="rule-item">
        <div class="rule-title">審稿三問</div>
        <div class="rule-content">講太深？太像教學？維持需求入口定位？</div>
      </div>
      <div class="rule-item">
        <div class="rule-title">雙週主軸輪替</div>
        <div class="rule-content">需求判讀 / 資產解題 / 常見誤判 / 協作整合</div>
      </div>
      <div class="rule-item">
        <div class="rule-title">停損機制</div>
        <div class="rule-content">連 2 週未產出 → 黃燈；連 3 週 → 紅燈</div>
      </div>
    </div>

    <!-- Control Log -->
    <div class="section-title">控場紀錄</div>
    <div class="timeline" id="controlLog"></div>
  </div>

  <script>
    // Load data
    let dashboardData = null;

    async function loadData() {
      try {
        const response = await fetch('data.json');
        if (!response.ok) {
          throw new Error('Failed to load data.json');
        }
        dashboardData = await response.json();
        renderDashboard();
      } catch (error) {
        console.error('Error loading data:', error);
        dashboardData = getEmptyData();
        renderDashboard();
      }
    }

    function getEmptyData() {
      return {
        project: {
          name: "每週內容引擎建置專案",
          code: "CONTENT-ENGINE",
          startDate: "--",
          endDate: "--",
          totalWeeks: 0,
          currentWeek: 0,
          phase: "Phase 0",
          light: "gray",
          principle: "Costco 模式：少而準，長期建立信任"
        },
        weeklyStatus: {
          currentStep: 0,
          stepLabels: [
            "CCW 搜尋市場訊號",
            "整理候選題庫",
            "Mac + GPT 選題收斂",
            "CCW 產出文章",
            "Mac 審稿確認",
            "發布"
          ],
          biweekTheme: "",
          notes: ""
        },
        candidates: [],
        articles: [],
        kpi: {
          totalArticles: 0,
          targetArticles: 8,
          consecutiveWeeks: 0,
          inquiries: 0,
          partnerInteractions: 0
        },
        roles: {
          mac: { status: "idle", currentTask: "", lastActive: "" },
          gpt: { status: "idle", currentTask: "", lastActive: "" },
          cc: { status: "idle", currentTask: "", lastActive: "" },
          ccw: { status: "idle", currentTask: "", lastActive: "" }
        },
        controlLog: [],
        lastUpdated: new Date().toISOString().split('T')[0]
      };
    }

    function renderDashboard() {
      renderHeader();
      renderKPI();
      renderWorkflow();
      renderRoles();
      renderCandidates();
      renderArticles();
      renderControlLog();
    }

    function renderHeader() {
      const { project } = dashboardData;
      document.getElementById('projectCode').textContent = project.code || '--';
      document.getElementById('startDate').textContent = formatDate(project.startDate);
      document.getElementById('endDate').textContent = formatDate(project.endDate);
      document.getElementById('totalWeeks').textContent = project.totalWeeks || '--';
      document.getElementById('currentWeek').textContent = project.currentWeek || '0';
      document.getElementById('phase').textContent = project.phase || '--';

      const lightIndicator = document.getElementById('lightIndicator');
      const lightStatus = document.getElementById('lightStatus');
      const light = project.light || 'gray';
      lightIndicator.className = `light-indicator ${light}`;
      lightStatus.textContent = light.toUpperCase();
    }

    function renderKPI() {
      const { kpi } = dashboardData;
      document.getElementById('totalArticlesNum').textContent = kpi.totalArticles || '0';
      document.getElementById('targetArticlesNum').textContent = kpi.targetArticles || '0';
      document.getElementById('consecutiveWeeksNum').textContent = kpi.consecutiveWeeks || '0';
      document.getElementById('inquiriesNum').textContent = kpi.inquiries || '0';
      document.getElementById('partnerInteractionsNum').textContent = kpi.partnerInteractions || '0';
    }

    function renderWorkflow() {
      const { weeklyStatus } = dashboardData;
      const container = document.getElementById('workflowSteps');
      container.innerHTML = '';

      weeklyStatus.stepLabels.forEach((label, index) => {
        const status = index < weeklyStatus.currentStep ? 'completed' : (index === weeklyStatus.currentStep ? 'active' : 'pending');

        const step = document.createElement('div');
        step.className = 'workflow-step';

        const circle = document.createElement('div');
        circle.className = `workflow-step-circle ${status}`;
        circle.textContent = index + 1;

        const labelEl = document.createElement('div');
        labelEl.className = 'workflow-step-label';
        labelEl.textContent = label;

        step.appendChild(circle);
        step.appendChild(labelEl);
        container.appendChild(step);

        if (index < weeklyStatus.stepLabels.length - 1) {
          const arrow = document.createElement('div');
          arrow.className = 'workflow-arrow';
          container.appendChild(arrow);
        }
      });
    }

    function renderRoles() {
      const { roles } = dashboardData;
      const container = document.getElementById('roleGrid');
      container.innerHTML = '';

      const roleOrder = ['mac', 'gpt', 'cc', 'ccw'];
      const roleNames = { mac: 'Mac', gpt: 'GPT', cc: 'CC', ccw: 'CCW' };

      roleOrder.forEach(roleKey => {
        const role = roles[roleKey];
        const card = document.createElement('div');
        card.className = 'role-card';

        const header = document.createElement('div');
        header.className = 'role-header';

        const name = document.createElement('div');
        name.className = 'role-name';
        name.textContent = roleNames[roleKey];

        const badge = document.createElement('div');
        badge.className = `role-badge ${role.status}`;
        badge.textContent = role.status;

        header.appendChild(name);
        header.appendChild(badge);

        const detail = document.createElement('div');
        detail.className = 'role-detail';
        detail.innerHTML = `
          <label>Current Task</label>
          <div class="role-detail-value">${role.currentTask || '(no task)'}</div>
          <label>Last Active</label>
          <div class="role-detail-value">${role.lastActive || '--'}</div>
        `;

        card.appendChild(header);
        card.appendChild(detail);
        container.appendChild(card);
      });
    }

    function renderCandidates() {
      const { candidates } = dashboardData;
      const container = document.getElementById('candidatesTable');
      const filterContainer = document.getElementById('themeFilters');

      // Create filter buttons
      filterContainer.innerHTML = '';
      const themes = new Set(candidates.map(c => c.theme).filter(t => t));
      const allBtn = document.createElement('button');
      allBtn.className = 'filter-btn active';
      allBtn.textContent = 'All';
      allBtn.onclick = () => {
        document.querySelectorAll('#themeFilters .filter-btn').forEach(b => b.classList.remove('active'));
        allBtn.classList.add('active');
        renderCandidatesTable(candidates);
      };
      filterContainer.appendChild(allBtn);

      themes.forEach(theme => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = theme;
        btn.onclick = () => {
          document.querySelectorAll('#themeFilters .filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const filtered = candidates.filter(c => c.theme === theme);
          renderCandidatesTable(filtered);
        };
        filterContainer.appendChild(btn);
      });

      renderCandidatesTable(candidates);
    }

    function renderCandidatesTable(candidates) {
      const container = document.getElementById('candidatesTable');
      if (candidates.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>目前尚無候選題庫</p></div>';
        return;
      }

      const table = document.createElement('table');
      table.innerHTML = `
        <thead>
          <tr>
            <th>Title</th>
            <th>Source</th>
            <th>Theme</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Added Date</th>
          </tr>
        </thead>
        <tbody>
          ${candidates.map(c => `
            <tr>
              <td>${escapeHtml(c.title)}</td>
              <td>${escapeHtml(c.source)}</td>
              <td><span class="theme-badge">${escapeHtml(c.theme)}</span></td>
              <td>${escapeHtml(c.priority)}</td>
              <td><span class="status-badge ${c.status.toLowerCase()}">${escapeHtml(c.status)}</span></td>
              <td>${formatDate(c.addedDate)}</td>
            </tr>
          `).join('')}
        </tbody>
      `;
      container.innerHTML = '';
      container.appendChild(table);
    }

    function renderArticles() {
      const { articles } = dashboardData;
      const container = document.getElementById('articlesTable');

      if (articles.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>目前尚無發布文章</p></div>';
        return;
      }

      const table = document.createElement('table');
      table.innerHTML = `
        <thead>
          <tr>
            <th>Title</th>
            <th>Publish Date</th>
            <th>Theme</th>
            <th>Channel</th>
            <th>Views</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${articles.map(a => `
            <tr>
              <td>${escapeHtml(a.title)}</td>
              <td>${formatDate(a.publishDate)}</td>
              <td><span class="theme-badge">${escapeHtml(a.theme)}</span></td>
              <td>${escapeHtml(a.channel)}</td>
              <td>${a.views || '0'}</td>
              <td><span class="status-badge published">${escapeHtml(a.status)}</span></td>
            </tr>
          `).join('')}
        </tbody>
      `;
      container.innerHTML = '';
      container.appendChild(table);
    }

    function renderControlLog() {
      const { controlLog } = dashboardData;
      const container = document.getElementById('controlLog');

      if (controlLog.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>目前尚無控場紀錄</p></div>';
        return;
      }

      container.innerHTML = controlLog.map((entry, index) => `
        <div class="timeline-item">
          <div class="timeline-marker">${index + 1}</div>
          <div class="timeline-content">
            <div class="timeline-date">${formatDate(entry.date)}</div>
            <div class="timeline-type">${escapeHtml(entry.type)}</div>
            <div class="timeline-summary">${escapeHtml(entry.summary)}</div>
          </div>
        </div>
      `).join('');
    }

    function formatDate(dateStr) {
      if (!dateStr || dateStr === '--') return '--';
      try {
        const date = new Date(dateStr);
        return date.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });
      } catch {
        return dateStr;
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Initialize
    loadData();
  </script>
</body>
</html>
